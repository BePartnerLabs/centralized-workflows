name: Labeler

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Apply Labels
    runs-on: ubuntu-latest
    steps:
      # fuxingloh/multi-labeler@v5 pinned SHA for supply chain safety.
      # Matches conventional-commit PR titles/branches against the org-wide
      # config in BePartnerLabs/.github (.github/labeler.yml, default branch).
      - uses: fuxingloh/multi-labeler@bcd50af464202999e57f556b4aefcf05a34abf85
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          config-repo: BePartnerLabs/.github
