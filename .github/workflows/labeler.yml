name: Labeler

on:
  workflow_call:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Apply Labels
    runs-on: ubuntu-latest
    steps:
      # fuxingloh/multi-labeler reads config from the org .github repo,
      # so consumer repos need zero local labeler config.
      - uses: fuxingloh/multi-labeler@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          config-repo: BePartnerLabs/.github
          config-path: .github/labeler.yml
