name: Setup — Install & Cache

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "22"
    outputs:
      store-path:
        description: pnpm store path for cache key
        value: ${{ jobs.setup.outputs.store-path }}
      cache-key:
        description: pnpm cache key
        value: ${{ jobs.setup.outputs.cache-key }}

jobs:
  setup:
    name: Install dependencies
    runs-on: ubuntu-latest
    outputs:
      store-path: ${{ steps.store.outputs.path }}
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - uses: actions/checkout@v7

      # pnpm/action-setup errors if BOTH an explicit version and package.json's
      # "packageManager" field are present, even when they agree. Every repo
      # is expected to pin "packageManager" in package.json (pnpm's own
      # recommended practice) — the version is read from there.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Get pnpm store path
        id: store
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Compute cache key
        id: cache-key
        run: echo "key=${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}" >> $GITHUB_OUTPUT

      - uses: actions/cache@v6
        id: pnpm-cache
        with:
          path: ${{ steps.store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        if: steps.pnpm-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile
