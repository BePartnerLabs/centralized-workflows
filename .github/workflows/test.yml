name: Test

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "22"
      cache-key:
        type: string
        required: true
      store-path:
        type: string
        required: true
      test-command:
        type: string
        default: pnpm vitest run tests/unit
      coverage:
        type: boolean
        default: false

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
      - uses: actions/cache@v6
        with:
          path: ${{ inputs.store-path }}
          key: ${{ inputs.cache-key }}
      - run: pnpm install --frozen-lockfile
      - run: ${{ inputs.test-command }}

      - name: Coverage summary
        if: ${{ inputs.coverage }}
        run: |
          SUMMARY=coverage/coverage-summary.json
          if [ ! -f "$SUMMARY" ]; then echo "No coverage report found" >> $GITHUB_STEP_SUMMARY; exit 0; fi
          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Statements | Branches | Functions | Lines |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|---|---|" >> $GITHUB_STEP_SUMMARY
          node -e "
            const s = JSON.parse(require('fs').readFileSync('$SUMMARY'));
            const t = s.total;
            const pct = k => t[k].pct + '%';
            console.log('| **Total** | ' + pct('statements') + ' | ' + pct('branches') + ' | ' + pct('functions') + ' | ' + pct('lines') + ' |');
          " >> $GITHUB_STEP_SUMMARY
