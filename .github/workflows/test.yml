name: Test

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "22"
      cache-key:
        type: string
        required: true
      store-path:
        type: string
        required: true
      test-command:
        type: string
        default: pnpm vitest run tests/unit

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
      - uses: actions/cache@v4
        with:
          path: ${{ inputs.store-path }}
          key: ${{ inputs.cache-key }}
      - run: pnpm install --frozen-lockfile
      - run: ${{ inputs.test-command }}
